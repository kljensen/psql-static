name: Build & Release

# Builds a fully static, musl-linked psql binary for each supported
# PostgreSQL major version × architecture and publishes one release per
# major (pg15, pg16, pg17, pg18) — each always tracking the latest patch.
#
# Triggered:
#  - weekly (picks up new patch releases automatically)
#  - manually via workflow_dispatch
#  - on push to main (CI smoke-test only; no release created)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── 1. Determine the latest patch release for each supported PG major ──────
  versions:
    name: Determine PostgreSQL versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Fetch latest patch versions from postgresql.org
        id: set
        run: |
          python3 - <<'EOF'
          import urllib.request, re, json, os

          MAJORS = [15, 16, 17, 18]
          html = urllib.request.urlopen(
              'https://ftp.postgresql.org/pub/source/'
          ).read().decode()

          includes = []
          for major in MAJORS:
              patches = re.findall(rf'v({major}\.\d+)/', html)
              if not patches:
                  continue
              latest = max(patches, key=lambda v: int(v.split('.')[1]))
              for runner, platform, arch in [
                  ('ubuntu-latest',    'linux/amd64', 'x86_64'),
                  ('ubuntu-24.04-arm', 'linux/arm64', 'aarch64'),
              ]:
                  includes.append({
                      'pg_version': latest,
                      'pg_major':   str(major),
                      'runner':     runner,
                      'platform':   platform,
                      'arch':       arch,
                  })

          matrix = json.dumps({'include': includes})
          print(f'Resolved matrix:\n{json.dumps(includes, indent=2)}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f'matrix={matrix}\n')
          EOF

  # ── 2. Build — one job per (pg_version × arch) ────────────────────────────
  build:
    name: psql ${{ matrix.pg_version }} / ${{ matrix.arch }}
    needs: versions
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJSON(needs.versions.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build static psql
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: PG_VERSION=${{ matrix.pg_version }}
          outputs: type=local,dest=./output
          cache-from: type=gha,scope=pg${{ matrix.pg_major }}-${{ matrix.arch }}
          cache-to:   type=gha,scope=pg${{ matrix.pg_major }}-${{ matrix.arch }},mode=max

      - name: Stage binary
        run: mv output/psql psql-${{ matrix.pg_version }}-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: psql-${{ matrix.pg_version }}-linux-${{ matrix.arch }}
          path: psql-${{ matrix.pg_version }}-linux-${{ matrix.arch }}
          retention-days: 1

  # ── 3. Publish one release per PG major (pg15, pg16, pg17, pg18) ──────────
  release:
    name: Publish per-major releases
    needs: [versions, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          pattern: 'psql-*'

      - name: Create/update per-major releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX: ${{ needs.versions.outputs.matrix }}
        run: |
          python3 - <<'EOF'
          import json, os, subprocess
          from pathlib import Path

          matrix  = json.loads(os.environ['MATRIX'])
          repo    = os.environ['GITHUB_REPOSITORY']

          # One entry per major (deduplicate across arches)
          versions = {}
          for item in matrix['include']:
              versions.setdefault(item['pg_major'], item['pg_version'])

          max_major = max(versions)

          for major in sorted(versions):
              version = versions[major]
              tag     = f"pg{major}"
              title   = f"PostgreSQL {major} — psql {version}"
              files   = sorted(Path('artifacts').glob(f'psql-{version}-linux-*'))

              body = "\n".join([
                  f"Static, musl-linked `psql` {version} built from official PostgreSQL source.",
                  "No shared library dependencies — drop it anywhere and run.",
                  "",
                  "## Download",
                  "",
                  "```bash",
                  "# x86_64 (Intel/AMD)",
                  f"curl -fsSL https://github.com/{repo}/releases/download/{tag}/psql-{version}-linux-x86_64 -o psql",
                  "chmod +x psql && ./psql --version",
                  "",
                  "# aarch64 (ARM64)",
                  f"curl -fsSL https://github.com/{repo}/releases/download/{tag}/psql-{version}-linux-aarch64 -o psql",
                  "chmod +x psql && ./psql --version",
                  "```",
              ])

              # Delete existing release + detach tag so we can recreate cleanly
              subprocess.run(['gh', 'release', 'delete', tag, '--yes'], capture_output=True)
              subprocess.run(['git', 'push', 'origin', f':refs/tags/{tag}'], capture_output=True)

              cmd = (
                  ['gh', 'release', 'create', tag,
                   '--title', title, '--notes', body,
                   '--latest' if major == max_major else '--latest=false']
                  + [str(f) for f in files]
              )
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"FAILED {tag}: {r.stderr}", flush=True)
                  raise SystemExit(1)
              print(f"Published {tag}: {title}", flush=True)
          EOF
